name:                     Path
query:                    api/cluster/counter/tables/path
object:                   path

counters:
  - ^^id
  - ^node.name             => node
  - read_data
  - read_iops
  - read_latency
  - total_data
  - total_iops
  - write_data
  - write_iops
  - write_latency

plugins:
  LabelAgent:
    split:
      - id `.` nodehostadapter,target_wwpn
      - nodehostadapter `:` ,hostadapter

export_options:
  instance_keys:
    - hostadapter # from plugin
    - node
    - target_wwpn # from plugin

